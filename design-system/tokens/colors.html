<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Palette — Scorebook &amp; Broadcast</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  body { margin:0; padding:24px; background:#12161d; font-family:'Barlow Condensed',Arial,sans-serif; color:#e8e2d4; }
  h2 { font-family:'Playfair Display',Georgia,serif; font-size:14px; letter-spacing:.14em; text-transform:uppercase; color:#c9a55c; margin:18px 0 8px; }
  .row { display:flex; flex-wrap:wrap; gap:10px; }
  .sw { width:118px; border-radius:6px; overflow:hidden; border:1px solid rgba(232,226,212,.12); }
  .sw .c { height:56px; }
  .sw .m { padding:6px 8px; background:#1d232e; font-size:12px; letter-spacing:.06em; text-transform:uppercase; }
  .sw .m b { display:block; font-size:13px; letter-spacing:.1em; }
</style>
</head>
<body>
  <h2>Studio &amp; Slate — broadcast layer</h2>
  <div class="row">
    <div class="sw"><div class="c" style="background:#12161d"></div><div class="m"><b>Studio</b>#12161d</div></div>
    <div class="sw"><div class="c" style="background:#1d232e"></div><div class="m"><b>Slate</b>#1d232e</div></div>
    <div class="sw"><div class="c" style="background:#242c39"></div><div class="m"><b>Slate raised</b>#242c39</div></div>
    <div class="sw"><div class="c" style="background:#e8e2d4"></div><div class="m"><b>Text</b>#e8e2d4</div></div>
  </div>
  <h2>Paper &amp; Ink — nostalgia layer</h2>
  <div class="row">
    <div class="sw"><div class="c" style="background:#f3ecdc"></div><div class="m"><b>Paper</b>#f3ecdc</div></div>
    <div class="sw"><div class="c" style="background:#e7dcc4"></div><div class="m"><b>Paper deep</b>#e7dcc4</div></div>
    <div class="sw"><div class="c" style="background:#cdbd9c"></div><div class="m"><b>Paper edge</b>#cdbd9c</div></div>
    <div class="sw"><div class="c" style="background:#241f18"></div><div class="m"><b>Ink</b>#241f18</div></div>
  </div>
  <h2>Accents — used sparingly</h2>
  <div class="row">
    <div class="sw"><div class="c" style="background:#c9a55c"></div><div class="m"><b>Brass</b>#c9a55c</div></div>
    <div class="sw"><div class="c" style="background:#a8843d"></div><div class="m"><b>Brass deep</b>#a8843d</div></div>
    <div class="sw"><div class="c" style="background:#7d3330"></div><div class="m"><b>Leather</b>#7d3330</div></div>
    <div class="sw"><div class="c" style="background:#4c6b52"></div><div class="m"><b>Turf</b>#4c6b52</div></div>
  </div>
</body>
</html>
