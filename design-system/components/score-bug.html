<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Score bug — broadcast lower-third</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  body { margin:0; padding:28px; background:#12161d; font-family:Georgia,serif; }
  .matchup { display:flex; align-items:center; justify-content:space-between; max-width:600px; background:linear-gradient(180deg,#242c39,#1d232e); border:1px solid rgba(201,165,92,.3); border-left:4px solid #c9a55c; border-radius:6px; padding:12px 20px; box-shadow:0 6px 18px rgba(0,0,0,.35); color:#e8e2d4; }
  .fighter { display:flex; flex-direction:column; align-items:center; gap:3px; font-family:'Playfair Display',Georgia,serif; font-weight:700; font-size:14px; }
  .fighter em { font-family:'Barlow Condensed',Arial,sans-serif; font-size:10px; font-style:normal; font-weight:500; text-transform:uppercase; letter-spacing:.24em; color:#c9a55c; }
  .score { text-align:center; }
  .score-line { font-family:'Barlow Condensed',Arial,sans-serif; font-weight:700; font-size:42px; line-height:1; letter-spacing:.03em; color:#f3ecdc; font-variant-numeric:tabular-nums; }
  .balls-line { margin-top:3px; font-family:'Barlow Condensed',Arial,sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:.18em; color:rgba(232,226,212,.62); }
  svg text { font-family:Georgia,serif; }
</style>
</head>
<body>
  <div class="matchup">
    <div class="fighter">
      <svg width="56" height="56" viewBox="0 0 64 64"><defs><linearGradient id="ga" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7b1e26"/><stop offset="100%" stop-color="#c69214"/></linearGradient></defs><circle cx="32" cy="32" r="30" fill="url(#ga)" stroke="rgba(0,0,0,.25)" stroke-width="2"/><text x="32" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">VR</text><text x="32" y="52" text-anchor="middle" font-size="16">😎</text></svg>
      <span>Viv</span><em>bat</em>
    </div>
    <div class="score">
      <div class="score-line">34/0</div>
      <div class="balls-line">12 of 12 balls</div>
    </div>
    <div class="fighter">
      <svg width="56" height="56" viewBox="0 0 64 64"><defs><linearGradient id="gb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b6623"/><stop offset="100%" stop-color="#f4c430"/></linearGradient></defs><circle cx="32" cy="32" r="30" fill="url(#gb)" stroke="rgba(0,0,0,.25)" stroke-width="2"/><text x="32" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">SW</text><text x="32" y="52" text-anchor="middle" font-size="16">🌀</text></svg>
      <span>Warne</span><em>ball</em>
    </div>
  </div>
</body>
</html>
