<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Momentum worm — leather to turf</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  body { margin:0; padding:32px 28px; background:#12161d; }
  .momentum { display:flex; align-items:center; gap:12px; max-width:600px; font-family:'Barlow Condensed',Arial,sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:.14em; color:rgba(232,226,212,.62); }
  .mom-track { flex:1; height:8px; border-radius:4px; background:linear-gradient(90deg,#7d3330 0%,#3e4440 50%,#4c6b52 100%); position:relative; box-shadow:inset 0 1px 3px rgba(0,0,0,.55); }
  .mom-track::after { content:''; position:absolute; left:50%; top:-3px; bottom:-3px; width:1px; background:rgba(232,226,212,.25); }
  .mom-marker { position:absolute; top:-6px; width:4px; height:20px; border-radius:2px; background:#f3ecdc; border:1px solid #a8843d; box-shadow:0 0 8px rgba(201,165,92,.6); transform:translateX(-50%); }
</style>
</head>
<body>
  <div class="momentum">
    <span>Warne</span>
    <div class="mom-track"><div class="mom-marker" style="left:78%"></div></div>
    <span>Viv</span>
  </div>
</body>
</html>
