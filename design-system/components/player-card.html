<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Player cards — vintage cigarette-card, default &amp; selected</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  body { margin:0; padding:28px; background:#12161d; display:flex; gap:14px; }
  .player-card { display:flex; flex-direction:column; align-items:center; gap:2px; width:160px; padding:12px 8px 10px; border:1px solid #cdbd9c; border-radius:6px; background:linear-gradient(165deg,#f7f0e0 0%,#f3ecdc 55%,#e7dcc4 100%); color:#241f18; font-family:Georgia,serif; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,.28); cursor:pointer; }
  .player-card.selected { border:2px solid #a8843d; padding:11px 7px 9px; background:linear-gradient(165deg,#fdf7e7 0%,#f5ecd4 60%,#ecdfc0 100%); box-shadow:0 0 0 3px rgba(201,165,92,.22),0 6px 18px rgba(0,0,0,.35); }
  .pc-name { font-family:'Playfair Display',Georgia,serif; font-weight:700; font-size:15px; margin-top:5px; }
  .pc-era { font-size:11px; font-style:italic; color:rgba(36,31,24,.6); }
  .pc-stats { font-family:'Barlow Condensed',Arial,sans-serif; font-size:13px; font-weight:700; letter-spacing:.05em; color:#a8843d; }
  .pc-style { font-size:11px; font-style:italic; color:rgba(36,31,24,.55); }
  svg text { font-family:Georgia,serif; }
</style>
</head>
<body>
  <div class="player-card">
    <svg width="52" height="52" viewBox="0 0 64 64"><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7b1e26"/><stop offset="100%" stop-color="#c69214"/></linearGradient></defs><circle cx="32" cy="32" r="30" fill="url(#g1)" stroke="rgba(0,0,0,.25)" stroke-width="2"/><text x="32" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">VR</text><text x="32" y="52" text-anchor="middle" font-size="16">😎</text></svg>
    <span class="pc-name">Viv Richards</span>
    <span class="pc-era">1974–1991 · West Indies</span>
    <span class="pc-stats">avg 50.23 · SR 85</span>
    <span class="pc-style">Right-hand, swaggering destroyer</span>
  </div>
  <div class="player-card selected">
    <svg width="52" height="52" viewBox="0 0 64 64"><defs><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b6623"/><stop offset="100%" stop-color="#f4c430"/></linearGradient></defs><circle cx="32" cy="32" r="30" fill="url(#g2)" stroke="rgba(0,0,0,.25)" stroke-width="2"/><text x="32" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">DB</text><text x="32" y="52" text-anchor="middle" font-size="16">🧢</text></svg>
    <span class="pc-name">Don Bradman</span>
    <span class="pc-era">1928–1948 · Australia</span>
    <span class="pc-stats">avg 99.94 · SR 58</span>
    <span class="pc-style">Right-hand, ruthless run machine</span>
  </div>
</body>
</html>
