<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Buttons — brass primary, outline secondary</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  body { margin:0; padding:28px; background:#12161d; display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  .btn { font-family:'Barlow Condensed',Arial,sans-serif; font-size:15px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; padding:12px 22px; border-radius:6px; border:1px solid rgba(201,165,92,.55); background:transparent; color:#e8e2d4; cursor:pointer; min-height:48px; }
  .btn:hover { border-color:#c9a55c; }
  .btn.primary { background:linear-gradient(180deg,#d6b269,#c9a55c 45%,#a8843d); border-color:#a8843d; color:#241f18; font-weight:700; box-shadow:0 6px 18px rgba(0,0,0,.35); text-shadow:0 1px 0 rgba(255,255,255,.25); }
  .btn:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
  .btn.small { padding:8px 14px; font-size:13px; min-height:40px; }
</style>
</head>
<body>
  <button class="btn primary">▶ Start Spell</button>
  <button class="btn">⚙ Change setup</button>
  <button class="btn primary" disabled>▶ Start Spell</button>
  <button class="btn small">🎲 Reroll</button>
</body>
</html>
