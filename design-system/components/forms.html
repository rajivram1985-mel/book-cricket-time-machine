<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Panel, inputs &amp; validation</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  body { margin:0; padding:28px; background:#12161d; font-family:Georgia,serif; }
  .panel { max-width:520px; background:#1d232e; border:1px solid rgba(232,226,212,.09); border-radius:8px; padding:16px 18px; color:#e8e2d4; }
  .panel h2 { margin:2px 0 14px; font-family:'Playfair Display',Georgia,serif; font-weight:700; font-size:18px; }
  .field { display:block; margin-bottom:12px; font-size:14px; color:rgba(232,226,212,.62); }
  .field input { display:block; width:100%; box-sizing:border-box; margin-top:5px; padding:11px 13px; font-size:16px; font-family:Georgia,serif; border:1px solid #cdbd9c; border-radius:5px; background:linear-gradient(180deg,#f8f2e3,#f3ecdc); color:#241f18; }
  .field input::placeholder { color:rgba(36,31,24,.45); font-style:italic; }
  .error { background:#7d3330; color:#f3e6dc; border-radius:5px; padding:9px 13px; font-size:14px; }
  .hint { font-size:13px; color:rgba(232,226,212,.62); line-height:1.45; }
  .disclaimer { font-size:12px; font-style:italic; color:rgba(232,226,212,.62); border-top:1px dashed rgba(232,226,212,.2); padding-top:9px; }
</style>
</head>
<body>
  <div class="panel">
    <h2>📖 Pick your lucky book</h2>
    <label class="field">Book title
      <input type="text" placeholder="e.g. Wuthering Heights (the battered library copy)" />
    </label>
    <label class="field">Total pages
      <input type="text" value="12" />
    </label>
    <p class="error">That’s a pamphlet, not a book! Needs more than 20 pages.</p>
    <p class="hint">Classic mode is pure page-flip luck — the players are just along for the ride.</p>
    <p class="disclaimer">Stats mode is a playful simulation for fun — not a factual prediction.</p>
  </div>
</body>
</html>
