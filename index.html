<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Book Cricket Time Machine — the schoolyard classic, now with cricket legends and a daily challenge the whole world plays together. A playful simulation, not a prediction." />
    <title>Book Cricket Time Machine</title>

    <meta name="theme-color" content="#12161d" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Real 1200x630 link-preview card — source is
         store-assets/og-image-source.svg (same design language as the app
         icon and Play Store feature graphic, rasterized once via a
         throwaway `npm install --no-save sharp`, never a persisted dep). -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bookcrickettimemachine.com/" />
    <meta property="og:title" content="Book Cricket Time Machine" />
    <meta property="og:description" content="The schoolyard classic, revived — flip a page, duel cricket legends, chase the daily challenge the whole world plays together." />
    <meta property="og:image" content="https://bookcrickettimemachine.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Book Cricket Time Machine" />
    <meta name="twitter:description" content="The schoolyard classic, revived — flip a page, duel cricket legends, chase the daily challenge the whole world plays together." />
    <meta name="twitter:image" content="https://bookcrickettimemachine.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <!-- The Umami analytics script is NOT loaded here on purpose — it's
         injected from src/analytics.ts only when the player's saved
         "Anonymous usage stats" preference is on, so a real opt-out (the
         "Anonymous usage stats" checkbox in the header) genuinely stops it
         from loading on the next visit, not just from sending custom
         events. See CLAUDE.md and public/privacy.html. -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
